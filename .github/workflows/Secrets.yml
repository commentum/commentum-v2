name: Export Cloud Secrets

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Link to cloud project
      - name: Link to Cloud Project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REFV2 }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --password "$SUPABASE_DB_PASSWORD"

      # Export all secrets
      - name: Export Secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REFV2 }}
        run: |
          supabase secrets list \
            --project-ref "$SUPABASE_PROJECT_REF" \
            -o pretty > cloud_secrets.txt

          echo "✅ Secrets exported"
          cat cloud_secrets.txt

      # Copy secrets file to server
      - name: Copy Secrets to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          source: "cloud_secrets.txt"
          target: "/root/supabase/"

      # Apply secrets to self-hosted
      - name: Apply Secrets to Self-Hosted
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /root/supabase/docker

            # Convert secrets to .env format
            while IFS= read -r line; do
              # Skip header lines
              [[ "$line" =~ ^Name|^---|- ]] && continue
              # Extract key and value
              key=$(echo "$line" | awk '{print $1}')
              value=$(echo "$line" | awk '{print $2}')
              # Skip empty lines
              [[ -z "$key" ]] && continue
              # Append to .env file
              echo "$key=$value" >> /root/supabase/docker/.env
            done < /root/supabase/cloud_secrets.txt

            echo "✅ Secrets applied to .env"
            echo "📋 Current .env:"
            cat /root/supabase/docker/.env

            # Restart to pick up new env vars
            docker compose down && docker compose up -d
            echo "✅ Restarted with new secrets"
